detect_extensions = [
    "sbt",
    "scala",
]
detect_files = [
    ".scalaenv",
    ".sbtenv",
    "build.sbt",
]
detect_folders = [".metals"]

[shell]
format = "[$indicator]($style) "
bash_indicator = "bsh"
fish_indicator = "fsh"
zsh_indicator = "zsh"
powershell_indicator = "psh"
ion_indicator = "ion"
elvish_indicator = "esh"
tcsh_indicator = "tsh"
nu_indicator = "nu"
xonsh_indicator = "xsh"
cmd_indicator = "cmd"
unknown_indicator = ""
style = "white bold"
disabled = true

[shlvl]
threshold = 2
format = "[$symbol$shlvl]($style) "
symbol = "тЖХя╕П  "
repeat = false
style = "bold yellow"
disabled = true

[singularity]
symbol = ""
format = '[$symbol\[$env\]]($style) '
style = "blue bold dimmed"
disabled = false

[solidity]
format = "[$symbol($version)]($style)"
version_format = "v${major}.${minor}.${patch}"
disabled = false
style = "bold blue"
symbol = "S "
compiler = ["solc"]
detect_extensions = ["sol"]
detect_files = []
detect_folders = []

[spack]
truncation_length = 1
format = "[$symbol$environment]($style) "
symbol = "ЁЯЕв "
style = "blue bold"
disabled = false

[status]
format = "[$symbol$status]($style) "
symbol = "тЭМ"
success_symbol = ""
not_executable_symbol = "ЁЯЪл"
not_found_symbol = "ЁЯФН"
sigint_symbol = "ЁЯз▒"
signal_symbol = "тЪб"
style = "bold red"
map_symbol = false
recognize_signal_code = true
pipestatus = false
pipestatus_separator = "|"
pipestatus_format = '\[$pipestatus\] => [$symbol$common_meaning$signal_name$maybe_int]($style)'
disabled = true

[sudo]
format = "[as $symbol]($style)"
symbol = "ЁЯзЩ "
style = "bold blue"
allow_windows = false
disabled = true

[swift]
format = "[$symbol($version )]($style)"
version_format = "v${raw}"
# symbol = "ЁЯРж "
symbol = "ґ░Ые "
style = "bold 202"
disabled = false
detect_extensions = ["swift"]
detect_files = ["Package.swift"]
detect_folders = []

[terraform]
format = "[$symbol$workspace]($style) "
version_format = "v${raw}"
symbol = "ЁЯТа "
style = "bold 105"
disabled = false
detect_extensions = [
    "tf",
    "tfplan",
    "tfstate",
]
detect_files = []
detect_folders = [".terraform"]

[time]
format = "[$time]($style) "
style = "cyan"
use_12hr = false
disabled = false
utc_time_offset = "local"
time_range = "-"
time_format = '%I:%M:%S'

[username]
format = "[$user]($style) in "
style_root = "red bold"
style_user = "yellow bold"
show_always = false
disabled = false

[vagrant]
format = "[$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "тН▒ "
style = "cyan bold"
disabled = false
detect_extensions = []
detect_files = ["Vagrantfile"]
detect_folders = []

[vcsh]
symbol = ""
style = "bold yellow"
format = "vcsh [$symbol$repo]($style) "
disabled = false

[vlang]
format = "[$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "V "
style = "blue bold"
disabled = false
detect_extensions = ["v"]
detect_files = [
    "v.mod",
    "vpkg.json",
    ".vpkg-lock.json",
]
detect_folders = []

[zig]
format = "[$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "тЖп "
style = "bold yellow"
disabled = false
detect_extensions = ["zig"]
detect_files = []
detect_folders = []

[custom]
