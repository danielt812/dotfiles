[vlang]
format = "[$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "V "
style = "blue bold"
disabled = false
detect_extensions = ["v"]
detect_files = [
  ".vpkg-lock.json",
  "v.mod",
  "vpkg.json",
]
detect_folders = []

[zig]
format = "[$symbol($version )]($style)"
version_format = "v${raw}"
symbol = "Ōå» "
style = "bold yellow"
disabled = false
detect_extensions = ["zig"]
detect_files = []
detect_folders = []

[custom]
