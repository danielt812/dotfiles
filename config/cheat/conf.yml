editor: nvim

colorize: true

style: monokai

formatter: terminal16m

pager: less -RF

cheatpaths:
  - name: community
    path: ~/.config/cheat/cheatsheets/community
    tags: [ community ]
    readonly: true

  - name: work
    path: ~/.config/cheat/cheatsheets/work
    tags: [ work ]
    readonly: false

  - name: personal
    path: ~/.config/cheat/cheatsheets/personal
    tags: [ personal ]
    readonly: false
