# ##############################################################################
# #                                  Plugins                                   #
# ##############################################################################

# https://github.com/tmux-plugins?q=&type=all&language=&sort=stargazers
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# ##############################################################################
# #                                  Options                                   #
# ##############################################################################

# Last saved environment is automatically restored when tmux is started.
set -g @continuum-restore 'on'

# Tmux is automatically started after the computer/server is turned on.
set -g @continuum-boot 'on'

# Set default terminal
set -g default-terminal "tmux-256color"

# Enable mouse support
set -g mouse on

# Allow image passthrough
set -g allow-passthrough on

# Bar style cursor
set -g terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[5 q'

# Set window and pane index to start from 1
set -g base-index 1
set -g pane-base-index 1

# Override confirmation on kill[x]
bind & kill-window
bind x kill-pane

# ##############################################################################
# #                                   Theme                                    #
# ##############################################################################

# Prefix -----------------------------------------------------------------------
set -g @prefix_highlight_fg white
set -g @prefix_highlight_bg brightcyan
set -g @prefix_highlight_output_prefix "#[fg=brightcyan]#[bg=#121212]#[bg=brightcyan]#[fg=black]"
set -g @prefix_highlight_output_suffix " "
set -g @prefix_highlight_copy_mode_attr "fg=brightcyan,bg=black,bold"
# Status -----------------------------------------------------------------------
set -g status-interval 1
set -g status on
# set -g status-left-length 30
set -g status-left-length 20
set -g status-justify left
set -g status-style bg=#121212,fg=black
set -g status-left "#[fg=black,bg=blue,bold] #S #[fg=blue,bg=#121212]"
set -g status-right "#{prefix_highlight}"
# Panes ------------------------------------------------------------------------
set -g pane-border-style bg=default,fg=brightblack
set -g pane-active-border-style bg=default,fg=blue
set -g display-panes-colour black
set -g display-panes-active-colour brightblack
# Clock ------------------------------------------------------------------------
setw -g clock-mode-colour cyan
# Messages ---------------------------------------------------------------------
set -g message-style bg=brightblack,fg=cyan
set -g message-command-style bg=brightblack,fg=cyan
# Windows ----------------------------------------------------------------------
set -g window-status-format "#[fg=#121212,bg=brightblack] #[fg=white,bg=brightblack]#I #[fg=white,bg=brightblack] #[fg=white,bg=brightblack]#W #F #[fg=brightblack,bg=#121212]"
set -g window-status-current-format "#[fg=#121212,bg=cyan] #[fg=black,bg=cyan]#I #[fg=black,bg=cyan] #[fg=black,bg=cyan]#W #F #[fg=cyan,bg=#121212]"
set -g window-status-separator ""

# ##############################################################################
# #                                 Navigation                                 #
# ##############################################################################

# Prevent tmux from stealing C-j/C-k inside fzf/lazygit/lazydocker/nvim
%hidden is_tui="ps -o comm= -t '#{pane_tty}' | grep -iqE 'fzf|lazy(git|docker)|n?vim'"
# Otherwise navigate tmux panes directly
bind -n C-h if-shell "$is_tui" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_tui" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_tui" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_tui" "send-keys C-l" "select-pane -R"

# ##############################################################################
# #                                  TPM Init                                  #
# ##############################################################################
run '~/.config/tmux/plugins/tpm/tpm'
